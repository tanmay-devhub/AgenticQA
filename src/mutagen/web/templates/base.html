<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}mutagen{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css?v=6">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">mutagen</a>
  <span class="subtitle">mutation-guided QA dashboard</span>
  <nav class="topnav">
    <a href="/" class="cta lockable">+ new run</a>
    <a href="/runs" class="lockable">runs</a>
    <a href="/jobs" class="lockable">jobs</a>
  </nav>
</header>
<main class="wrap">
{% block body %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-diff.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
